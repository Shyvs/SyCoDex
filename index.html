<!DOCTYPE html>
<html>
<head>
    <title>SyCoDex</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>SyCoDex</h1>

<p>Enter a name to discover SyCoMon:</p>

<input id="nameInput" placeholder="Enter name">

<button onclick="generatesycomon()">Generate</button>


<div id="sycomonCard">

    <h2 id="sycomonName"></h2>

    <p><b>Type:</b> <span id="sycomonType"></span></p>

    <p><b>Category:</b> <span id="sycomonCategory"></span></p>

    <p><b>Appearance:</b> <span id="sycomonAppearance"></span></p>

    <p><b>Personality:</b> <span id="sycomonPersonality"></span></p>

    <p><b>Habitat:</b> <span id="sycomonHabitat"></span></p>

    <p><b>Dex Entry:</b> <span id="sycomonDescription"></span></p>

</div>

<script src="script.js"></script>

</body>
</html>
