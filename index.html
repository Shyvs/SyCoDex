<!DOCTYPE html>
<html>

<head>
    <title>SyCoDex</title>
    <link rel="stylesheet" href="style.css">
</head>


<body>

<h1>SyCoDex</h1>

<p>Enter a name to discover a SyCoMon:</p>


<input id="nameInput" placeholder="Enter name">

<button id="searchButton" onclick="generate()">Search!</button>

<button id="logButton" onclick="logSighting()" style="display:none;">
    Log Sighting!
</button>


<div id="sycomonCard">

    <h2 id="sycomonName"></h2>


    <div class="section">
        <b>Type</b>
        <div id="sycomonType"></div>
    </div>


    <div class="section">
        <b>Rarity</b>
        <div id="sycomonRarity"></div>
    </div>


    <div class="section">
        <b>Appearance</b>
        <p id="sycomonAppearance"></p>
    </div>


    <div class="section">
        <b>Colors</b>
        <p id="sycomonColors"></p>
    </div>


    <div class="section">
        <b>Personality</b>
        <p id="sycomonPersonality"></p>
    </div>


    <div class="section">
        <b>Habitat</b>
        <p id="sycomonHabitat"></p>
    </div>


    <div class="section" id="discoveredSection" style="display:none;">
        <b>Discovery</b>
        <p id="sycomonDiscovery"></p>
    </div>


</div>



<!-- Data files first -->
<script src="js/data/types.js"></script>

<script src="js/data/traits/shapes.js"></script>
<script src="js/data/traits/materials.js"></script>
<script src="js/data/traits/features.js"></script>
<script src="js/data/traits/details.js"></script>

<script src="js/data/flavor.js"></script>


<!-- Utility files -->
<script src="js/random.js"></script>
<script src="js/rarity.js"></script>


<!-- Generator last -->
<script src="js/generator.js"></script>


<!-- Website controls -->
<script src="js/script.js"></script>


</body>

</html>
